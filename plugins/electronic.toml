# Electronic Mood Pack
# Synth-based electronic music styles
# Each mood specifies a base_mood (built-in) for audio generation

[pack]
name = "electronic"
version = "1.1.0"
author = "midi-cli-rs"
description = "Electronic and synth-based moods"

[[moods]]
name = "synthwave"
base_mood = "upbeat"          # Uses upbeat generator with these overrides
default_key = "Am"
default_tempo = 118
default_intensity = 65
description = "80s inspired synthwave with arpeggios and bass"
tags = ["electronic", "synthwave", "retro", "80s"]

[[moods]]
name = "chillout"
base_mood = "ambient"         # Uses ambient generator
default_key = "Em"
default_tempo = 85
default_intensity = 40
description = "Relaxed downtempo electronic"
tags = ["electronic", "chill", "downtempo", "ambient"]

[[moods]]
name = "techno"
base_mood = "upbeat"          # Uses upbeat generator at high tempo
default_key = "Dm"
default_tempo = 130
default_intensity = 85
description = "Driving techno with pumping bass"
tags = ["electronic", "techno", "dance", "club"]

[[moods]]
name = "8bit"
base_mood = "chiptune"        # Uses dedicated chiptune generator
default_key = "C"
default_tempo = 140
default_intensity = 70
description = "Retro 8-bit video game style chiptune"
tags = ["electronic", "8bit", "chiptune", "retro", "game"]
